<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments | Focus Clinical Admin</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="admin-styles.css">
</head>

<body class="admin-body">
    <!-- Overlay -->
    <div class="sidebar-overlay"></div>
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <img src="../assets/images/admin-logo.png" alt="Focus Clinical" class="sidebar-logo logo-desktop">
            <img src="../assets/images/logo-mark.png" alt="Focus Clinical" class="sidebar-logo logo-mobile">
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="appointments.html" class="nav-item active">
                <i class="fas fa-calendar-check"></i>
                <span>Appointments</span>
            </a>
            <a href="contacts.html" class="nav-item">
                <i class="fas fa-envelope"></i>
                <span>Contact Messages</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-globe"></i>
                <span>View Website</span>
            </a>
            <button class="nav-item logout-btn" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-topbar">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Appointments</h1>
                <div id="cloudStatus" style="margin-left: 20px;"></div>
            </div>
            <div class="topbar-right">
                <div class="admin-user">
                    <i class="fas fa-user-circle"></i>
                    <span>helpdesk@focusdiagnostics.co.ke</span>
                </div>
            </div>
        </header>

        <div class="admin-content">
            <!-- Page Header -->
            <div class="page-header">
                <h2>All Appointment Requests</h2>
                <div class="header-actions">
                    <button class="btn btn-export" onclick="exportAppointmentsCSV()">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button class="btn btn-export" onclick="exportAppointmentsPDF()">
                        <i class="fas fa-file-pdf"></i> Export PDF
                    </button>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="table-toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search patients, services, or phone..."
                        onkeyup="filterAppointments()">
                </div>
                <select id="statusFilter" class="filter-select" onchange="filterAppointments()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>

            <!-- Appointments Table -->
            <div class="dashboard-card">
                <div class="card-body" style="padding: 0;">
                    <table class="data-table" id="appointmentsTable">
                        <thead>
                            <tr>
                                <th>Patient Name</th>
                                <th>Phone</th>
                                <th>Service</th>
                                <th>Branch</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                    <p class="empty-state" id="noAppointments" style="display: none;">
                        <i class="fas fa-calendar-times"></i><br>
                        No appointments found
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- View Modal -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Appointment Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="appointmentDetails">
                <!-- Populated by JS -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">Close</button>
                <button class="btn btn-primary" id="confirmBtn" onclick="confirmAppointment()">
                    <i class="fas fa-check"></i> Confirm
                </button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        requireAuth();
        checkCloudConnection();

        let currentAppointmentId = null;
        let allAppointments = [];
        let conflictIds = new Set(); // Store IDs of conflicting appointments

        async function loadAppointments() {
            allAppointments = (await getAppointments()).reverse();
            checkForConflicts(allAppointments); // Identify double bookings
            filterAppointments();
        }

        function checkForConflicts(appointments) {
            conflictIds.clear();
            const timeSlots = {};

            // Group by [Branch + Date + Time]
            appointments.forEach(a => {
                if (a.status !== 'cancelled' && a.status !== 'rejected') {
                    const key = `${a.branch || 'main'}-${a.date}-${a.time}`;
                    if (timeSlots[key]) {
                        // Mark both as conflicts
                        conflictIds.add(timeSlots[key]);
                        conflictIds.add(a.id);
                    } else {
                        timeSlots[key] = a.id;
                    }
                }
            });
        }

        function filterAppointments() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allAppointments.filter(a => {
                const matchesQuery = (a.fullname && a.fullname.toLowerCase().includes(query)) ||
                    (a.phone && a.phone.includes(query)) ||
                    (a.service && a.service.toLowerCase().includes(query)) ||
                    (a.email && a.email.toLowerCase().includes(query));

                const matchesStatus = status === '' || a.status === status;

                return matchesQuery && matchesStatus;
            });

            renderTable(filtered);
        }

        function renderTable(appointments) {
            const tbody = document.querySelector('#appointmentsTable tbody');
            const noData = document.getElementById('noAppointments');
            const table = document.getElementById('appointmentsTable');

            if (appointments.length === 0) {
                noData.style.display = 'block';
                table.style.display = 'none';
                return;
            }

            noData.style.display = 'none';
            table.style.display = 'table';

            tbody.innerHTML = appointments.map(a => {
                const isConflict = conflictIds.has(a.id);
                // Override status badge if conflict exists and it's not cancelled
                const conflictBadge = isConflict && a.status !== 'cancelled' ?
                    `<span class="badge badge-error" style="background-color: #fee2e2; color: #dc2626;"><i class="fas fa-exclamation-triangle"></i> Conflict</span>` : '';

                return `
                <tr class="${isConflict ? 'row-conflict' : ''}" style="${isConflict ? 'background-color: #fff1f2;' : ''}">
                    <td>
                        <a href="#" class="data-link" onclick="viewAppointment('${a.id}'); return false;">
                            ${a.fullname}
                        </a>
                    </td>
                    <td>${a.phone}</td>
                    <td>${a.service}</td>
                    <td>${a.branch ? a.branch.charAt(0).toUpperCase() + a.branch.slice(1) : '-'}</td>
                    <td>${formatDate(a.date)}</td>
                    <td>${a.time}</td>
                    <td>
                        <div style="display: flex; gap: 5px; flex-direction: column;">
                            ${getStatusBadge(a.status)}
                            ${conflictBadge}
                        </div>
                    </td>
                    <td class="actions">
                        <button class="action-view" title="View Details" onclick="viewAppointment('${a.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        ${a.status === 'pending' || isConflict ? `
                            <button class="action-confirm" title="Confirm" onclick="quickConfirm('${a.id}')" style="color: var(--success);">
                                <i class="fas fa-check"></i>
                            </button>
                            <button class="action-reschedule" title="Request Reschedule (Double Booked)" onclick="sendRescheduleEmail('${a.id}')" style="color: var(--warning); border: 1px solid var(--border-color); background: white;">
                                <i class="fas fa-clock"></i>
                            </button>
                        ` : ''}
                        <button class="action-delete" title="Delete" onclick="removeAppointment('${a.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        async function viewAppointment(id) {
            currentAppointmentId = id;
            const appointments = await getAppointments();
            const a = appointments.find(apt => apt.id === id);

            if (!a) return;

            const isConflict = conflictIds.has(a.id);

            document.getElementById('appointmentDetails').innerHTML = `
                <div class="detail-grid">
                    ${isConflict ? `
                    <div class="detail-item full" style="background: #fff1f2; border: 1px solid #fecaca; padding: 10px; border-radius: 6px;">
                        <div class="detail-label" style="color: #dc2626;"><i class="fas fa-exclamation-triangle"></i> Scheduling Conflict Detected</div>
                        <div class="detail-value" style="color: #7f1d1d;">This slot is double-booked. Please reschedule one of the appointments.</div>
                    </div>
                    ` : ''}
                    <div class="detail-item">
                        <div class="detail-label">Full Name</div>
                        <div class="detail-value">${a.fullname}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Phone Number</div>
                        <div class="detail-value">${a.phone}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Email</div>
                        <div class="detail-value">${a.email || '-'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Date of Birth</div>
                        <div class="detail-value">${formatDate(a.dob)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">ID/Passport</div>
                        <div class="detail-value">${a.idNumber || '-'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Service</div>
                        <div class="detail-value">${a.service}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Preferred Branch</div>
                        <div class="detail-value">${a.branch ? a.branch.charAt(0).toUpperCase() + a.branch.slice(1) : '-'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Appointment Date</div>
                        <div class="detail-value">${formatDate(a.date)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Preferred Time</div>
                        <div class="detail-value">${a.time}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Status</div>
                        <div class="detail-value">${getStatusBadge(a.status)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Patient Status</div>
                        <div class="detail-value">${a.firstVisit ? '<span class="badge badge-info">New Patient</span>' : '<span class="badge">Returning</span>'}</div>
                    </div>
                    <div class="detail-item full">
                        <div class="detail-label">Reason for Visit</div>
                        <div class="detail-value">${a.reason || 'Not specified'}</div>
                    </div>
                     ${a.insuranceProvider ? `
                    <div class="detail-item">
                        <div class="detail-label">Insurance Provider</div>
                        <div class="detail-value">${a.insuranceProvider}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Policy Number</div>
                        <div class="detail-value">${a.policyNumber || '-'}</div>
                    </div>
                    ` : ''}
                    <div class="detail-item full">
                        <div class="detail-label">Additional Notes</div>
                        <div class="detail-value">${a.notes || 'No additional notes'}</div>
                    </div>
                    <div class="detail-item full">
                        <div class="detail-label">Submitted On</div>
                        <div class="detail-value">${formatDateTime(a.createdAt)}</div>
                    </div>
                </div>
            `;

            // Adjust buttons for conflict resolution
            const footerHtml = `
                <button class="btn btn-outline" onclick="closeModal()">Close</button>
                <div style="display: flex; gap: 10px;">
                     <button class="btn btn-warning" onclick="sendRescheduleEmail('${a.id}')" style="background-color: #f59e0b; color: white; border: none;">
                        <i class="fas fa-clock"></i> Suggest Reschedule
                    </button>
                    ${a.status === 'pending' ? `
                    <button class="btn btn-primary" id="confirmBtn" onclick="confirmAppointment()">
                        <i class="fas fa-check"></i> Confirm
                    </button>
                    ` : ''}
                </div>
            `;
            document.querySelector('.modal-footer').innerHTML = footerHtml;

            document.getElementById('viewModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentAppointmentId = null;
        }

        async function confirmAppointment() {
            if (currentAppointmentId) {
                const appointments = await getAppointments();
                const apt = appointments.find(a => a.id === currentAppointmentId);

                await updateAppointmentStatus(currentAppointmentId, 'confirmed');
                closeModal();
                loadAppointments();

                if (apt && apt.email) {
                    if (confirm(`Appointment confirmed. Open email client to send confirmation to ${apt.email}?`)) {
                        sendConfirmationEmail(apt);
                    }
                }
            }
        }

        async function quickConfirm(id) {
            if (confirm('Confirm this appointment?')) {
                const appointments = await getAppointments();
                const apt = appointments.find(a => a.id === id);

                await updateAppointmentStatus(id, 'confirmed');
                loadAppointments();

                if (apt && apt.email) {
                    if (confirm(`Appointment confirmed. Open email client to send confirmation to ${apt.email}?`)) {
                        sendConfirmationEmail(apt);
                    }
                }
            }
        }

        function sendConfirmationEmail(appointment) {
            const subject = `Appointment Confirmation - Focus Clinical`;
            const branchName = appointment.branch ? appointment.branch.charAt(0).toUpperCase() + appointment.branch.slice(1) : 'Main Branch';
            const body = `Dear ${appointment.fullname},

We are pleased to confirm your appointment with Focus Clinical and Diagnostics Centre.

Appointment Details:
--------------------------------------------------
Service: ${appointment.service}
Date: ${formatDate(appointment.date)}
Time: ${appointment.time}
Location: ${branchName}
--------------------------------------------------

Please arrive 10 minutes prior to your scheduled time.
Please carry your ID and Insurance Card (if applicable).

If you have any questions or need to reschedule, please contact us at info@focusclinical.co.ke.

Best regards,
Focus Clinical Team`;

            window.location.href = `mailto:${appointment.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        async function sendRescheduleEmail(id) {
            // Find appointment locally first or fetch
            let apt = allAppointments.find(a => a.id === id);
            if (!apt) {
                const appointments = await getAppointments();
                apt = appointments.find(a => a.id === id);
            }

            if (!apt) {
                alert('Appointment not found');
                return;
            }

            if (!apt.email) {
                alert('This patient does not have an email address provided.');
                return;
            }

            // Mark as 'rescheduled' or 'pending' remains? Let's just send the email first.
            // Optional: update status to 'pending-reschedule' if supported, but for now just send email.

            const subject = `Action Required: Reschedule Appointment at Focus Clinical`;
            const branchName = apt.branch ? apt.branch.charAt(0).toUpperCase() + apt.branch.slice(1) : 'Main Branch';

            // Generate some alternative suggestons (next day same time, or 2 days later)
            const dateObj = new Date(apt.date);
            const nextDay = new Date(dateObj); nextDay.setDate(dateObj.getDate() + 1);
            const nextNextDay = new Date(dateObj); nextNextDay.setDate(dateObj.getDate() + 2);

            const body = `Dear ${apt.fullname},

Thank you for choosing Focus Clinical and Diagnostics Centre.

Regarding your requested appointment for:
Service: ${apt.service}
Date: ${formatDate(apt.date)}
Time: ${apt.time}

Unfortunately, this specific slot is currently unavailable or fully booked.

We kindly request you to select an alternative date or time.
Suggested alternatives:
1. ${formatDate(nextDay.toISOString().split('T')[0])} at ${apt.time}
2. ${formatDate(nextNextDay.toISOString().split('T')[0])} at ${apt.time}

Please reply to this email to confirm one of the above, or visit our website to book a new slot that suits your schedule.

We apologize for any inconvenience caused.

Best regards,
Focus Clinical Team`;

            window.location.href = `mailto:${apt.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        function removeAppointment(id) {
            if (confirm('Are you sure you want to delete this appointment?')) {
                deleteAppointment(id);
                loadAppointments();
            }
        }

        async function exportAppointmentsCSV() {
            const data = (await getAppointments()).map(a => ({
                'ID': a.id,
                'Full Name': a.fullname,
                'Email': a.email,
                'Phone': a.phone,
                'Date of Birth': formatDate(a.dob),
                'ID/Passport': a.idNumber,
                'Service': a.service,
                'Branch': a.branch,
                'Appointment Date': formatDate(a.date),
                'Appointment Time': a.time,
                'Reason for Visit': a.reason,
                'New Patient': a.firstVisit ? 'Yes' : 'No',
                'Insurance Provider': a.insuranceProvider || 'None',
                'Policy Number': a.policyNumber || 'N/A',
                'SMS Reminders': a.smsReminders ? 'Yes' : 'No',
                'Status': a.status,
                'Admin Notes': a.notes,
                'Submission Date': formatDateTime(a.createdAt)
            }));
            exportToCSV(data, 'focus_clinical_appointments');
        }

        async function exportAppointmentsPDF() {
            const data = (await getAppointments()).map(a => ({
                'Patient': a.fullname,
                'Phone': a.phone,
                'Service': a.service,
                'Branch': a.branch || '-',
                'Date': formatDate(a.date),
                'Status': a.status
            }));
            exportToPDF(data, 'Focus Clinical - Appointment Requests', 'focus_appointments_report');
        }

        // Initialize
        loadAppointments();
    </script>
</body>

</html>
